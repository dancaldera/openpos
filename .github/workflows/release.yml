name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        default: v0.3.2
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release-linux:
    name: Build Linux Release
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        id: version
        run: |
          node -e "const fs = require('fs'); const tag = process.env.RELEASE_TAG.replace(/^v/, ''); const files = ['apps/desktop/package.json', 'apps/api/package.json', 'apps/landing/package.json']; for (const file of files) { const version = JSON.parse(fs.readFileSync(file, 'utf8')).version; if (version !== tag) { console.error(`${file} version ${version} does not match tag ${tag}`); process.exit(1); } } fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${tag}\n`);"

      - name: Check desktop app
        run: bun run --cwd apps/desktop check

      - name: Build Linux artifacts
        run: bun run --cwd apps/desktop build:desktop:linux

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenPOS v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            apps/desktop/dist-electron/*.AppImage
            apps/desktop/dist-electron/*.deb
