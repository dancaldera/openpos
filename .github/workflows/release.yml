name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_VERSION: 0.3.0
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Validate public release environment
        run: |
          forbidden_vars=(
            TURSO_DATABASE_URL
            TURSO_AUTH_TOKEN
            JWT_SECRET
            ALLOWED_ORIGIN
            VITE_API_URL
          )

          found=0
          for var_name in "${forbidden_vars[@]}"; do
            if printenv "$var_name" >/dev/null; then
              echo "Forbidden environment variable set for public desktop release: $var_name"
              found=1
            fi
          done

          if [ "$found" -ne 0 ]; then
            echo "Public desktop releases must not embed runtime or backend configuration."
            exit 1
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OpenPOS v${{ env.APP_VERSION }} - Linux Release
          releaseBody: 'OpenPOS v${{ env.APP_VERSION }}. See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-unknown-linux-gnu
