name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        id: version
        run: |
          node <<'EOF'
          const fs = require('fs')

          const output = process.env.GITHUB_OUTPUT
          if (!output) {
            throw new Error('GITHUB_OUTPUT is not defined')
          }

          const tag = process.env.RELEASE_TAG.replace(/^v/, '')
          const files = ['apps/desktop/package.json', 'apps/api/package.json', 'apps/landing/package.json']

          for (const file of files) {
            const version = JSON.parse(fs.readFileSync(file, 'utf8')).version
            if (version !== tag) {
              console.error(`${file} version ${version} does not match tag ${tag}`)
              process.exit(1)
            }
          }

          fs.appendFileSync(output, `version=${tag}\n`)
          EOF

      - name: Check desktop app
        run: bun run --cwd apps/desktop check

      - name: Build Linux artifacts
        run: bun run --cwd apps/desktop build:desktop:linux

      - name: Verify Linux artifacts
        run: |
          shopt -s nullglob
          appimages=(apps/desktop/dist-electron/*.AppImage)
          debs=(apps/desktop/dist-electron/*.deb)

          if [ ${#appimages[@]} -eq 0 ]; then
            echo "Missing AppImage artifact in apps/desktop/dist-electron"
            exit 1
          fi

          if [ ${#debs[@]} -eq 0 ]; then
            echo "Missing .deb artifact in apps/desktop/dist-electron"
            exit 1
          fi

          printf 'AppImage artifacts:\n%s\n' "${appimages[@]}"
          printf '.deb artifacts:\n%s\n' "${debs[@]}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          if-no-files-found: error
          path: |
            apps/desktop/dist-electron/*.AppImage
            apps/desktop/dist-electron/*.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS artifacts
        run: bun run --cwd apps/desktop build:desktop:mac

      - name: Verify macOS artifacts
        run: |
          shopt -s nullglob
          dmgs=(apps/desktop/dist-electron/*.dmg)
          zips=(apps/desktop/dist-electron/*.zip)

          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "Missing .dmg artifact in apps/desktop/dist-electron"
            exit 1
          fi

          if [ ${#zips[@]} -eq 0 ]; then
            echo "Missing .zip artifact in apps/desktop/dist-electron"
            exit 1
          fi

          printf '.dmg artifacts:\n%s\n' "${dmgs[@]}"
          printf '.zip artifacts:\n%s\n' "${zips[@]}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          if-no-files-found: error
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-macos]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenPOS v${{ needs.build-linux.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.dmg
            release-assets/*.zip
